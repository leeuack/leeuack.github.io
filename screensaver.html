<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>DESTECTIC</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Helvetica Neue',Arial,sans-serif;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}

#startScreen{
  position:fixed;inset:0;z-index:500;
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  transition:opacity .6s ease;
}
#startScreen.hidden{opacity:0;pointer-events:none}
#startScreen h1{
  font-size:1.6rem;font-weight:300;
  letter-spacing:.25em;color:rgba(255,255,255,.7);
  text-transform:uppercase;margin-bottom:1.2rem;
}
#startScreen p{
  font-size:.85rem;color:rgba(255,255,255,.35);
}

#slideshow{position:relative;width:100vw;height:100vh;overflow:hidden}

.slide{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  opacity:0;
  transition:opacity .8s ease;
  z-index:1;
}
.slide.active{opacity:1;z-index:2}

.slide-bg{
  position:absolute;
  top:-30px;left:-30px;right:-30px;bottom:-30px;
  background-size:cover;background-position:center;
  filter:blur(40px) brightness(.3) saturate(.8);
  z-index:0;
}

.slide-img{position:absolute;z-index:1}

.slide-img.mode-cover{
  top:0;left:0;width:100%;height:100%;
  object-fit:cover;
}

.slide-img.mode-contain{
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  max-width:96%;max-height:92%;
  object-fit:contain;
}

.slide-img.mode-panorama{
  top:0;height:100%;width:auto;
  will-change:transform;
}

.slide-video{
  position:absolute;top:0;left:0;
  width:100%;height:100%;z-index:1;
  display:flex;align-items:center;justify-content:center;
}
.slide-video iframe{
  width:100%;height:56.25vw;
  max-height:100%;
  border:none;
}

/* Ken Burns */
@keyframes kb-zoom-in{
  0%{transform:scale(1)}
  100%{transform:scale(1.08)}
}
@keyframes kb-zoom-out{
  0%{transform:scale(1.08)}
  100%{transform:scale(1)}
}
@keyframes kb-drift-right{
  0%{transform:scale(1.05) translateX(-1.5%)}
  100%{transform:scale(1.05) translateX(1.5%)}
}
@keyframes kb-drift-left{
  0%{transform:scale(1.05) translateX(1.5%)}
  100%{transform:scale(1.05) translateX(-1.5%)}
}
.kb-zoom-in{animation:kb-zoom-in 5s ease forwards}
.kb-zoom-out{animation:kb-zoom-out 5s ease forwards}
.kb-drift-right{animation:kb-drift-right 5s ease forwards}
.kb-drift-left{animation:kb-drift-left 5s ease forwards}

/* Overlay */
.overlay{
  position:fixed;bottom:0;left:0;right:0;
  z-index:10;
  padding:80px 36px 44px;
  background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.45) 55%,transparent 100%);
  opacity:0;transform:translateY(16px);
  transition:opacity .5s ease,transform .5s ease;
  pointer-events:none;
}
.overlay.show{opacity:1;transform:translateY(0)}
.overlay.fade-out{
  opacity:0;transform:translateY(0);
  transition:opacity .8s ease;
}

.overlay-title{
  font-size:1.5rem;font-weight:700;
  color:#fff;line-height:1.3;
  margin-bottom:.4rem;
  letter-spacing:-.01em;
  text-shadow:0 2px 10px rgba(0,0,0,.4);
}
.overlay-text{
  font-size:.82rem;font-weight:300;
  color:rgba(255,255,255,.8);
  line-height:1.55;
  max-height:3.1em;overflow:hidden;
  text-shadow:0 1px 6px rgba(0,0,0,.3);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}

/* Watermark */
.watermark{
  position:fixed;top:24px;left:28px;z-index:50;
  font-size:.72rem;font-weight:600;
  letter-spacing:.18em;
  color:rgba(255,255,255,.3);
  text-transform:uppercase;
}

/* Progress */
.progress-bar{
  position:fixed;bottom:0;left:0;
  height:2px;width:0;
  background:rgba(255,255,255,.45);
  z-index:100;
}

/* Pause indicator */
.pause-icon{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  z-index:200;
  width:80px;height:80px;
  border-radius:50%;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  transition:transform .25s ease,opacity .25s ease;
  opacity:0;pointer-events:none;
}
.pause-icon.visible{transform:translate(-50%,-50%) scale(1);opacity:1}
.pause-icon::before{
  content:'';display:block;
  width:10px;height:28px;
  border-left:3px solid rgba(255,255,255,.9);
  border-right:3px solid rgba(255,255,255,.9);
}
.pause-icon.is-play::before{
  width:0;height:0;
  border-left:16px solid rgba(255,255,255,.9);
  border-right:none;
  border-top:10px solid transparent;
  border-bottom:10px solid transparent;
}

/* Slide counter */
.counter{
  position:fixed;top:24px;right:28px;z-index:50;
  font-size:.65rem;font-weight:400;
  color:rgba(255,255,255,.25);
  letter-spacing:.05em;
  font-variant-numeric:tabular-nums;
}

/* Composite: video + image collage */
.composite{
  position:absolute;inset:0;
  display:grid;
  grid-template-rows:auto auto 1fr;
  background:#000;z-index:1;
  overflow:hidden;
}
.composite-video{
  width:100%;overflow:hidden;
}
.composite-video iframe{
  width:100%;height:100%;border:none;display:block;
}
.composite-title{
  padding:8px 20px;
  background:rgba(0,0,0,.85);
}
.composite-title h2{
  font-size:1rem;font-weight:600;
  color:#fff;line-height:1.3;
  letter-spacing:-.01em;
}
.composite-title p{
  font-size:.7rem;font-weight:300;
  color:rgba(255,255,255,.6);
  line-height:1.4;margin-top:3px;
  display:-webkit-box;-webkit-line-clamp:1;
  -webkit-box-orient:vertical;overflow:hidden;
}
.composite-grid{
  min-height:0;overflow:hidden;
  display:grid;gap:2px;
  padding:2px;
  background:#000;
}
.composite-cell{
  overflow:hidden;min-height:0;min-width:0;
}
.composite-cell img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  will-change:transform;
}
@keyframes ckb-zoom-in{0%{transform:scale(1)}100%{transform:scale(1.15)}}
@keyframes ckb-zoom-out{0%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes ckb-pan-right{0%{transform:scale(1.2) translateX(-4%)}100%{transform:scale(1.2) translateX(4%)}}
@keyframes ckb-pan-left{0%{transform:scale(1.2) translateX(4%)}100%{transform:scale(1.2) translateX(-4%)}}
@keyframes ckb-pan-up{0%{transform:scale(1.15) translateY(3%)}100%{transform:scale(1.15) translateY(-3%)}}
@keyframes ckb-pan-down{0%{transform:scale(1.15) translateY(-3%)}100%{transform:scale(1.15) translateY(3%)}}
.ckb-0{animation:ckb-zoom-in 12s ease-in-out infinite alternate}
.ckb-1{animation:ckb-pan-right 14s ease-in-out infinite alternate}
.ckb-2{animation:ckb-zoom-out 11s ease-in-out infinite alternate}
.ckb-3{animation:ckb-pan-left 13s ease-in-out infinite alternate}
.ckb-4{animation:ckb-pan-up 12s ease-in-out infinite alternate}
.ckb-5{animation:ckb-pan-down 14s ease-in-out infinite alternate}
</style>

ter 2025"}}];

const SS = {
  idx: -1,
  buf: 'A',
  timer: null,
  overlayTimer: null,
  paused: false,
  vimeoPlayer: null,
  kbVariant: 0,

  els: {},

  init() {
    this.els = {
      slideA:     document.getElementById('slideA'),
      slideB:     document.getElementById('slideB'),
      overlay:    document.getElementById('overlay'),
      title:      document.getElementById('overlayTitle'),
      text:       document.getElementById('overlayText'),
      progress:   document.getElementById('progressBar'),
      counter:    document.getElementById('counter'),
      pauseIcon:  document.getElementById('pauseIcon'),
      start:      document.getElementById('startScreen'),
    };

    if (!SLIDES.length) {
      this.els.start.querySelector('p').textContent = 'No slides available';
      return;
    }

    this.els.start.addEventListener('click', () => this.start());
    this.els.start.addEventListener('touchend', e => { e.preventDefault(); this.start(); });

    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'p') this.togglePause();
      if (e.key === 'ArrowRight') this.skip(1);
      if (e.key === 'ArrowLeft') this.skip(-1);
      if (e.key === 'f') this.requestFullscreen();
    });

    let tapCount = 0, tapTimer = null;
    document.getElementById('slideshow').addEventListener('click', () => {
      tapCount++;
      clearTimeout(tapTimer);
      tapTimer = setTimeout(() => {
        if (tapCount >= 2) this.togglePause();
        tapCount = 0;
      }, 300);
    });
  },

  async start() {
    this.els.start.classList.add('hidden');
    setTimeout(() => this.els.start.style.display = 'none', 600);
    this.requestFullscreen();
    this.requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) this.requestWakeLock();
    });
    this.show(0);
  },

  requestFullscreen() {
    const el = document.documentElement;
    const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (rfs) {
      try { rfs.call(el); } catch(e) {}
    }
  },

  async requestWakeLock() {
    try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {}
  },

  next() { return (this.idx + 1) % SLIDES.length; },

  skip(dir) {
    if (this.paused) return;
    clearTimeout(this.timer);
    this.cleanupVideo();
    const n = (this.idx + dir + SLIDES.length) % SLIDES.length;
    this.show(n);
  },

  togglePause() {
    this.paused = !this.paused;
    const icon = this.els.pauseIcon;
    icon.classList.toggle('is-play', !this.paused);
    icon.classList.add('visible');
    setTimeout(() => icon.classList.remove('visible'), 800);

    if (this.paused) {
      clearTimeout(this.timer);
      this.els.progress.style.animationPlayState = 'paused';
      if (this.vimeoPlayer) try { this.vimeoPlayer.pause(); } catch(e) {}
    } else {
      this.els.progress.style.animationPlayState = 'running';
      if (this.vimeoPlayer) {
        try { this.vimeoPlayer.play(); } catch(e) {}
      } else {
        this.show(this.next());
      }
    }
  },

  show(index) {
    clearTimeout(this.timer);
    clearTimeout(this.overlayTimer);
    this.cleanupVideo();

    const slide = SLIDES[index];
    const nextBuf = this.buf === 'A' ? 'B' : 'A';
    const target = this.els['slide' + nextBuf];
    const current = this.els['slide' + this.buf];

    target.innerHTML = '';

    this.els.counter.textContent = `${index + 1} / ${SLIDES.length}`;

    if (slide.type === 'composite') {
      this.renderComposite(target, slide, index);
    } else if (slide.type === 'image') {
      this.renderImage(target, slide, index);
    } else if (slide.type === 'video') {
      this.renderVideo(target, slide, index);
    }

    target.classList.add('active');
    current.classList.remove('active');
    this.buf = nextBuf;
    this.idx = index;

    if (slide.type === 'composite') {
      this.els.overlay.className = 'overlay';
    } else if (slide.overlay) {
      this.showOverlay(slide.overlay, slide.type === 'video');
    } else {
      this.els.overlay.className = 'overlay';
    }

    this.preloadNext(index);
  },

  renderImage(el, slide, index) {
    const img = new Image();
    img.onload = () => {
      const R = img.naturalWidth / img.naturalHeight;

      const bg = document.createElement('div');
      bg.className = 'slide-bg';
      bg.style.backgroundImage = `url("${slide.src}")`;
      el.appendChild(bg);

      const imgEl = document.createElement('img');
      imgEl.src = slide.src;
      imgEl.className = 'slide-img';
      imgEl.draggable = false;

      if (R > 2.5) {
        this.setupPanorama(el, imgEl, R, slide);
      } else if (R > 1.8) {
        imgEl.classList.add('mode-contain');
        el.appendChild(imgEl);
        const dur = slide.duration || 4000;
        this.startProgress(dur);
        this.timer = setTimeout(() => this.show(this.next()), dur);
      } else {
        imgEl.classList.add('mode-cover');
        const kbClasses = ['kb-zoom-in','kb-zoom-out','kb-drift-right','kb-drift-left'];
        imgEl.classList.add(kbClasses[this.kbVariant % kbClasses.length]);
        this.kbVariant++;
        el.appendChild(imgEl);
        const dur = slide.duration || 4000;
        this.startProgress(dur);
        this.timer = setTimeout(() => this.show(this.next()), dur);
      }
    };
    img.onerror = () => {
      this.timer = setTimeout(() => this.show(this.next()), 300);
    };
    img.src = slide.src;
  },

  setupPanorama(el, imgEl, ratio, slide) {
    imgEl.classList.add('mode-panorama');
    el.appendChild(imgEl);

    const vh = window.innerHeight;
    const vw = window.innerWidth;
    const displayW = ratio * vh;
    const panDist = displayW - vw;
    const panSpeed = 250;
    const dur = Math.max(Math.round(panDist / panSpeed) * 1000, 4000);
    const cappedDur = Math.min(dur, 14000);

    imgEl.style.transform = 'translateX(0)';
    imgEl.style.transition = `transform ${cappedDur}ms linear`;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        imgEl.style.transform = `translateX(-${panDist}px)`;
      });
    });

    this.startProgress(cappedDur);
    this.timer = setTimeout(() => this.show(this.next()), cappedDur);
  },

  renderComposite(el, slide, index) {
    const wrap = document.createElement('div');
    wrap.className = 'composite';

    const imgCount = slide.images ? slide.images.length : 0;
    const hasImages = imgCount > 0;

    const vh = window.innerHeight;
    const vw = window.innerWidth;

    // Video section — 16:9 aspect ratio, capped to leave room for images
    const vidSection = document.createElement('div');
    vidSection.className = 'composite-video';
    let vidH = Math.round(vw * 9 / 16);
    if (hasImages) vidH = Math.min(vidH, Math.round(vh * 0.45));
    if (!hasImages) vidH = vh;
    vidSection.style.height = vidH + 'px';

    const iframe = document.createElement('iframe');
    iframe.src = `https://player.vimeo.com/video/${slide.video.vimeoId}?autoplay=1&muted=0&title=0&byline=0&portrait=0&loop=0&controls=0`;
    iframe.allow = 'autoplay; fullscreen; picture-in-picture';
    iframe.setAttribute('allowfullscreen', '');
    vidSection.appendChild(iframe);
    wrap.appendChild(vidSection);

    // Title bar
    if (slide.overlay) {
      const titleBar = document.createElement('div');
      titleBar.className = 'composite-title';
      const h2 = document.createElement('h2');
      h2.textContent = slide.overlay.title || '';
      titleBar.appendChild(h2);
      if (slide.overlay.text) {
        const p = document.createElement('p');
        p.textContent = slide.overlay.text;
        titleBar.appendChild(p);
      }
      wrap.appendChild(titleBar);
    }

    // Image collage grid — fit ALL images
    if (hasImages) {
      const grid = document.createElement('div');
      grid.className = 'composite-grid';
      const cols = imgCount === 1 ? 1 : imgCount <= 4 ? 2 : imgCount <= 9 ? 3 : 4;
      const rows = Math.ceil(imgCount / cols);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
      for (let i = 0; i < imgCount; i++) {
        const cell = document.createElement('div');
        cell.className = 'composite-cell';
        const img = document.createElement('img');
        img.src = slide.images[i];
        img.draggable = false;
        img.classList.add('ckb-' + (i % 6));
        cell.appendChild(img);
        grid.appendChild(cell);
      }
      wrap.appendChild(grid);
    }

    el.appendChild(wrap);

    // Vimeo end detection
    const fallback = 90000;
    this.timer = setTimeout(() => this.show(this.next()), fallback);
    try {
      const player = new Vimeo.Player(iframe);
      this.vimeoPlayer = player;
      player.on('ended', () => {
        clearTimeout(this.timer);
        this.show(this.next());
      });
      player.getDuration().then(d => {
        if (d > 0) {
          clearTimeout(this.timer);
          this.startProgress(d * 1000);
          this.timer = setTimeout(() => this.show(this.next()), (d + 1) * 1000);
        }
      }).catch(() => {});
    } catch(e) {
      this.timer = setTimeout(() => this.show(this.next()), 15000);
    }
  },

  renderVideo(el, slide, index) {
    const bg = document.createElement('div');
    bg.className = 'slide-bg';
    bg.style.background = '#000';
    el.appendChild(bg);

    const wrap = document.createElement('div');
    wrap.className = 'slide-video';
    const iframe = document.createElement('iframe');
    iframe.src = `https://player.vimeo.com/video/${slide.vimeoId}?autoplay=1&muted=0&title=0&byline=0&portrait=0&loop=0&controls=0`;
    iframe.allow = 'autoplay; fullscreen; picture-in-picture';
    iframe.setAttribute('allowfullscreen','');
    wrap.appendChild(iframe);
    el.appendChild(wrap);

    const fallback = 90000;
    this.timer = setTimeout(() => this.show(this.next()), fallback);

    try {
      const player = new Vimeo.Player(iframe);
      this.vimeoPlayer = player;
      player.on('ended', () => {
        clearTimeout(this.timer);
        this.show(this.next());
      });
      player.getDuration().then(d => {
        if (d > 0) {
          clearTimeout(this.timer);
          this.startProgress(d * 1000);
          this.timer = setTimeout(() => this.show(this.next()), (d + 1) * 1000);
        }
      }).catch(() => {});
    } catch(e) {
      this.timer = setTimeout(() => this.show(this.next()), 15000);
    }
  },

  cleanupVideo() {
    if (this.vimeoPlayer) {
      try { this.vimeoPlayer.destroy(); } catch(e) {}
      this.vimeoPlayer = null;
    }
  },

  showOverlay(data, persistent) {
    this.els.title.textContent = data.title || '';
    this.els.text.textContent = data.text || '';
    this.els.overlay.className = 'overlay show';

    clearTimeout(this.overlayTimer);
    if (!persistent) {
      this.overlayTimer = setTimeout(() => {
        this.els.overlay.className = 'overlay fade-out';
      }, 3200);
    }
  },

  startProgress(duration) {
    const bar = this.els.progress;
    bar.style.transition = 'none';
    bar.style.width = '0%';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        bar.style.transition = `width ${duration}ms linear`;
        bar.style.width = '100%';
      });
    });
  },

  preloadNext(currentIdx) {
    const n = (currentIdx + 1) % SLIDES.length;
    const s = SLIDES[n];
    if (s && s.type === 'image') {
      const p = new Image();
      p.src = s.src;
    }
  }
};

document.addEventListener('DOMContentLoaded', () => SS.init());
</script>
