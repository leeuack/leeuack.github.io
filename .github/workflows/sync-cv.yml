# ─────────────────────────────────────────────
#  Auto-sync CV from Overleaf → GitHub Pages
#  Runs daily at 6 AM UTC and on manual trigger
# ─────────────────────────────────────────────
name: Sync CV from Overleaf

on:
  schedule:
    - cron: '0 6 * * *'      # Daily at 6:00 AM UTC
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  sync-cv:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout this repo (leeuack.github.io)
      - name: Checkout GitHub Pages repo
        uses: actions/checkout@v4

      # 2. Clone Overleaf project via Git
      - name: Clone Overleaf project
        run: |
          git clone https://${{ secrets.OVERLEAF_EMAIL }}:${{ secrets.OVERLEAF_PASSWORD }}@git.overleaf.com/${{ secrets.OVERLEAF_PROJECT_ID }} overleaf-cv
        env:
          OVERLEAF_EMAIL: ${{ secrets.OVERLEAF_EMAIL }}
          OVERLEAF_PASSWORD: ${{ secrets.OVERLEAF_PASSWORD }}
          OVERLEAF_PROJECT_ID: ${{ secrets.OVERLEAF_PROJECT_ID }}

      # 3. Compile LaTeX to PDF
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: overleaf-cv
          # If your main .tex file has a different name, change above
          # You can also try: latexmk_use_xelatex: true

      # 4. Copy compiled PDF to repo root
      - name: Copy PDF
        run: |
          cp overleaf-cv/main.pdf ./Jinmo_Rhee_CV.pdf

      # 5. Commit and push if PDF changed
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Jinmo_Rhee_CV.pdf
          if git diff --cached --quiet; then
            echo "No changes to CV"
          else
            git commit -m "Auto-update CV from Overleaf [$(date +%Y-%m-%d)]"
            git push
          fi
